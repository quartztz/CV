name: Build Typst document
on: push
jobs:
  build_typst_documents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
      - name: compile PDF file
        run: typst compile CV.typ CV.pdf --ignore-system-fonts --font-path assets/
      - name: upload PDF file
        uses: actions/upload-artifact@v4
        with:
          name: PDF-${{ env.DATE }}
          path: "**/*.pdf"
      - name: create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "CV.pdf"
          body: "PDF generated from CV.typ"
          commit: "main"
          tag: "latest"
          allowUpdates: true
          makeLatest: true

