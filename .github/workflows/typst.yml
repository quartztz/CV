name: Build Typst document
on: push
jobs:
  build_typst_documents:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Typst
        uses: lvignoli/typst-action@main
        with:
          source_file: "CV.typ"
      - name: Upload PDF file
        uses: actions/upload-artifact@v4
        with:
          name: PDF-${{ env.DATE }}
          path: "**/*.pdf"
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "CV.pdf"
          body: "PDF generated from CV.typ"
          commit: "main"
          tag: "latest"
          allowUpdates: true